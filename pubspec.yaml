name: sorted_out
description: A boilerplate Flutter project.
publish_to: "none"
version: 0.3.8+15

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  font_awesome_flutter: ^11.0.0
  flutter_file_dialog: ^3.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  share_plus: ^12.0.1
  supabase_flutter: ^2.10.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0E5E56"
  adaptive_icon_foreground: assets/app_icon.png
  remove_alpha_ios: true
